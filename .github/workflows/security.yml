# .github/workflows/security.yml
# Security checks: static analysis, CodeQL, and secret scanning.
# Runs on every push and pull_request.

name: Security

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read
  security-events: write   # required to upload CodeQL SARIF results

jobs:
  # ── 1. Static analysis with cppcheck ───────────────────────────────────────
  cppcheck:
    name: cppcheck (C static analysis)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update -qq && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c11 \
            -I include \
            src/

  # ── 2. CodeQL analysis for C/C++ ───────────────────────────────────────────
  codeql:
    name: CodeQL (C/C++)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-extended

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libelf-dev libbpf-dev

      - name: Build for CodeQL
        run: make

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp

  # ── 3. Secret scanning with Gitleaks ──────────────────────────────────────
  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for gitleaks --log-opts

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
