# .github/workflows/vmi-build.yml
name: VMI Kernel Build

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check KVM available
        run: |
          ls /dev/kvm && echo "KVM available"
          grep -c "svm\|vmx" /proc/cpuinfo

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential libncurses-dev \
            bison flex libssl-dev libelf-dev \
            qemu-system-x86 qemu-kvm \
            libbpf-dev pkg-config \
            bc cpio wget

      - name: Build VMI daemon
        run: make

      - name: Run unit tests
        run: |
          make test-unit

      - name: Download and patch kernel
        run: |
          wget -q \
            https://cdn.kernel.org/pub/linux/kernel/v6.x/linux-6.6.tar.xz
          tar xf linux-6.6.tar.xz
          cd linux-6.6
          # Apply kvmi patches when available
          # git apply ../kernel/patches/kvmi-v7/*.patch

      - name: Configure kernel
        run: |
          cd linux-6.6
          make defconfig
          scripts/config --enable CONFIG_KVM
          scripts/config --enable CONFIG_KVM_AMD
          scripts/config --enable CONFIG_KVM_INTEL
          scripts/config --enable CONFIG_DEBUG_INFO_BTF
          make olddefconfig

      - name: Build kernel
        run: |
          cd linux-6.6
          make -j$(nproc) bzImage
          echo "Kernel built successfully"

      - name: Boot test in QEMU
        run: |
          # Minimal initramfs
          mkdir -p initramfs/bin
          cp /bin/busybox initramfs/bin/
          ln -s busybox initramfs/bin/sh
          cat > initramfs/init << 'EOF'
          #!/bin/sh
          mount -t proc none /proc
          mount -t sysfs none /sys
          echo "VMI test kernel booted"
          ls /sys/kernel/btf/vmlinux && echo "BTF OK"
          poweroff -f
          EOF
          chmod +x initramfs/init
          cd initramfs
          find . | cpio -H newc -o | gzip > ../initramfs.img
          cd ..

          timeout 120 qemu-system-x86_64 \
            -enable-kvm \
            -m 2G \
            -kernel linux-6.6/arch/x86/boot/bzImage \
            -initrd initramfs.img \
            -append "console=ttyS0 panic=1" \
            -nographic \
            -no-reboot || true

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: vmi-test-kernel
          path: linux-6.6/arch/x86/boot/bzImage
